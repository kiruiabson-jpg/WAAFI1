<!DOCTYPE html>
<html lang="so">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Waafi Loans</title>

    <!-- Telegram SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: #f1f3f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .app-header {
            width: 100%;
            background: linear-gradient(to bottom, #82d13d, #a3e635);
            padding: 20px 24px 40px;
            color: white;
            font-size: 24px;
            font-weight: 700;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .app-header .menu-icon {
            font-size: 28px;
            cursor: pointer;
        }
        
        .card {
            background: white;
            width: 92%;
            max-width: 450px;
            margin-top: -25px;
            padding: 30px 22px 24px;
            border-radius: 16px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.07);
        }
        
        .card h2 {
            font-size: 22px;
            color: #1a1a1a;
            text-align: center;
            margin-bottom: 4px;
        }
        
        .card .subtext {
            font-size: 11px;
            color: #999;
            text-align: center;
            margin-bottom: 28px;
        }
        
        .slider-section {
            margin-bottom: 24px;
        }
        
        .slider-header {
            display: flex;
            justify-content: space-between;
            font-weight: 600;
            font-size: 14px;
            color: #444;
            margin-bottom: 4px;
        }
        
        .green-text {
            color: #82d13d;
        }
        
        input[type="range"] {
            width: 100%;
            height: 6px;
            -webkit-appearance: none;
            appearance: none;
            accent-color: #82d13d;
            background: #e0e0e0;
            border-radius: 3px;
            outline: none;
            margin: 10px 0 6px;
        }
        
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 22px;
            height: 22px;
            background: #82d13d;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(130, 209, 61, 0.4);
        }
        
        input[type="range"]::-moz-range-thumb {
            width: 22px;
            height: 22px;
            background: #82d13d;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 2px 6px rgba(130, 209, 61, 0.4);
        }
        
        .slider-footer {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: #bbb;
        }
        
        .result-container {
            background: #f8faf8;
            border: 1px solid #eef5ee;
            border-radius: 14px;
            padding: 18px 16px;
            text-align: center;
            margin: 28px 0 24px;
        }
        
        .result-container p:first-child {
            font-size: 13px;
            color: #777;
            margin-bottom: 4px;
        }
        
        .result-value {
            color: #82d13d;
            font-size: 34px;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        
        .btn-apply {
            background: linear-gradient(to right, #82d13d, #95e14a);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            letter-spacing: 0.3px;
        }
        
        .btn-apply:active {
            opacity: 0.85;
        }
        
        .footer {
            text-align: center;
            font-size: 11px;
            color: #ccc;
            margin: 32px 0 20px;
            padding-bottom: 16px;
        }
    </style>
</head>

<body>

    <!-- Header -->
    <div class="app-header">
        <span>Waafi</span>
        <span class="menu-icon">☰</span>
    </div>

    <!-- Main Card -->
    <div class="card">
        <h2>Hel Amaah Deg Deg ah</h2>
        <p class="subtext">Ansixid degdeg ah • Qiimo tartan ah • Muddooyin dabacsan</p>

        <!-- Amount Slider -->
        <div class="slider-section">
            <h2 class="calculator-title">Xisaabinta Amaahda</h2>
            <div class="slider-header">
                <span>Qaddarka Amaahda</span>
                <span id="valAmt" class="green-text">$1,000</span>
            </div>
            <input type="range" id="amt" min="100" max="5000" step="100" value="1000">
            <div class="slider-footer">
                <span>$100</span>
                <span>$5,000</span>
            </div>
        </div>

        <!-- Duration Slider -->
        <div class="slider-section">
            <div class="slider-header">
                <span>Muddada Amaahda</span>
                <span id="valDur" class="green-text">12 bilood</span>
            </div>
            <input type="range" id="dur" min="6" max="60" step="6" value="12">
            <div class="slider-footer">
                <span>6 bilood</span>
                <span>60 bilood</span>
            </div>
        </div>

        <!-- Monthly Payment Result -->
        <div class="result-container">
            <p>Lacagta Bisha</p>
            <p id="monthly" class="result-value">$98.33</p>
        </div>

        <!-- Apply Button -->
        <button class="btn-apply" onclick="goToPage2()">CODSO HADDA</button>
    </div>

    <!-- Footer -->
    <div class="footer">© 2025 Waafi Soomaaliya</div>

    <script>
        // ---------- Update display on slider change ----------
        function updateDisplay() {
            const amountInput = document.getElementById('amt');
            const durationInput = document.getElementById('dur');

            if (!amountInput || !durationInput) return;

            const amount = Number(amountInput.value) || 0;
            const duration = Number(durationInput.value) || 1;

            // Update labels
            document.getElementById('valAmt').textContent = `$${amount.toLocaleString()}`;
            document.getElementById('valDur').textContent = `${duration} bilood`;

            // Monthly payment: (amount × 1.18) / duration
            const monthly = (amount * 1.18) / duration;
            document.getElementById('monthly').textContent = `$${monthly.toFixed(2)}`;
        }

        // ---------- Navigate to page2 ----------
        function goToPage2() {
            const amountInput = document.getElementById('amt');
            const durationInput = document.getElementById('dur');

            if (!amountInput || !durationInput) return;

            // Save to localStorage for the next page
            localStorage.setItem('amount', amountInput.value);
            localStorage.setItem('loanDuration', durationInput.value + ' Bilood');

            // Navigate to page2.html (same directory)
            window.location.href = 'page2.html';
        }

        // ---------- On page load ----------
        window.addEventListener('DOMContentLoaded', function() {
            // Telegram WebApp integration
            const tg = window.Telegram && window.Telegram.WebApp;
            if (tg) {
                tg.ready();
                tg.expand();
            }

            // Attach slider events
            const amountInput = document.getElementById('amt');
            const durationInput = document.getElementById('dur');

            if (amountInput) amountInput.addEventListener('input', updateDisplay);
            if (durationInput) durationInput.addEventListener('input', updateDisplay);

            // Initial calculation
            updateDisplay();
        });
    </script>

</body>

</html>
